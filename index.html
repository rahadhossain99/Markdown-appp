<!DOCTYPE html>
<html lang="bn" class="theme-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanMark - Ultimate Markdown Workspace</title>
    
    <!-- Tailwind CSS for modern and responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for ultimate readability (Bengali & English Custom Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Noto+Sans+Bengali:wght@300;400;500;600;700&family=Noto+Serif+Bengali:wght@300;400;700&family=Baloo+Da+2:wght@400;600;700&family=Hind+Siliguri:wght@300;400;500;600;700&family=Mina:wght@400;700&family=Atma:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons for premium high-quality SVGs -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- MarkedJS for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- DOMPurify to prevent XSS (Secure rendering) -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

    <!-- KaTeX for ultra-fast LaTeX Math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <!-- Highlight.js for beautiful Code Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/github.min.css" id="hljs-light-theme">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/github-dark.min.css" id="hljs-dark-theme" disabled>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/highlight.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans Bengali', 'Inter', 'sans-serif'],
                        serif: ['Lora', 'Noto Serif Bengali', 'serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-app: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-input: #ffffff;
            --accent: #4f46e5;
            --bg-blockquote: #f1f5f9;
            --hover-item: #f1f5f9;
        }
        .dark {
            --bg-app: #0f172a;
            --bg-card: #1e293b;
            --border-color: #334155;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --bg-input: #1e293b;
            --accent: #38bdf8;
            --bg-blockquote: #334155;
            --hover-item: #334155;
        }
        .theme-sepia {
            --bg-app: #fbf6e3;
            --bg-card: #f4eccf;
            --border-color: #e7dbb2;
            --text-main: #433422;
            --text-muted: #8c765c;
            --bg-input: #fbf6e3;
            --accent: #b45309;
            --bg-blockquote: #efe6c4;
            --hover-item: #efe6c4;
        }
        .theme-slate {
            --bg-app: #0b0f19;
            --bg-card: #111827;
            --border-color: #1f2937;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --bg-input: #111827;
            --accent: #6366f1;
            --bg-blockquote: #1f2937;
            --hover-item: #1f2937;
        }

        /* ================= DYNAMIC SYSTEM-WIDE APP INTERFACE FONT UPGRADE ================= */
        /* Standardizing fonts for system components without breaking third-party plugins */
        body, button, input, select, aside, header, footer, p, blockquote {
            font-family: 'Noto Sans Bengali', 'Inter', sans-serif;
        }

        /* Specific clean rule for non-KaTeX span/div components to prevent LaTeX math font breakages */
        #app-container span:not(.katex):not(.katex *), 
        #app-container div:not(.katex):not(.katex *):not(.katex-display) {
            font-family: 'Noto Sans Bengali', 'Inter', sans-serif;
        }

        /* Explicit preservation of native LaTeX math styling for KaTeX components */
        .katex, .katex *, .katex-display, .katex-display * {
            font-family: KaTeX_Main, 'Times New Roman', serif !important;
        }

        /* Ensure rendered output text can dynamically change family, inheriting cleanly from dropdown selector */
        #rendered-output {
            transition: font-family 0.2s ease;
        }
        #rendered-output *:not(.katex):not(.katex *):not(pre):not(code) {
            font-family: inherit;
        }

        /* Preserve clean monospacing for inputs/outputs representing code environments */
        textarea, pre, code, .font-mono {
            font-family: 'Fira Code', monospace !important;
        }

        .app-bg { background-color: var(--bg-app) !important; transition: background-color 0.2s ease; }
        .card-bg { background-color: var(--bg-card) !important; transition: background-color 0.2s ease; }
        .border-theme { border-color: var(--border-color) !important; transition: border-color 0.2s ease; }
        .text-main { color: var(--text-main) !important; transition: color 0.2s ease; }
        .text-muted { color: var(--text-muted) !important; transition: color 0.2s ease; }
        .input-bg { background-color: var(--bg-input) !important; color: var(--text-main) !important; transition: all 0.2s ease; }
        .hover-theme:hover { background-color: var(--hover-item) !important; }

        /* Smooth custom scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .markdown-body {
            line-height: 1.8;
            letter-spacing: -0.009em;
        }
        
        /* Typography Scale Upgrades */
        .text-size-xxs { font-size: 0.75rem; }
        .text-size-xxs h1 { font-size: 1.35rem; margin-top: 1.2em; }
        .text-size-xxs h2 { font-size: 1.15rem; margin-top: 1.2em; }
        .text-size-xxs h3 { font-size: 1.0rem; margin-top: 1.2em; }

        .text-size-xs { font-size: 0.85rem; }
        .text-size-xs h1 { font-size: 1.6rem; }
        .text-size-xs h2 { font-size: 1.4rem; }
        .text-size-xs h3 { font-size: 1.2rem; }

        .text-size-sm { font-size: 0.95rem; }
        .text-size-sm h1 { font-size: 1.85rem; }
        .text-size-sm h2 { font-size: 1.6rem; }
        .text-size-sm h3 { font-size: 1.35rem; }

        .text-size-md { font-size: 1.1rem; }
        .text-size-md h1 { font-size: 2.25rem; }
        .text-size-md h2 { font-size: 1.85rem; }
        .text-size-md h3 { font-size: 1.55rem; }

        .text-size-lg { font-size: 1.25rem; }
        .text-size-lg h1 { font-size: 2.65rem; }
        .text-size-lg h2 { font-size: 2.15rem; }
        .text-size-lg h3 { font-size: 1.8rem; }

        .text-size-xl { font-size: 1.45rem; }
        .text-size-xl h1 { font-size: 3.2rem; }
        .text-size-xl h2 { font-size: 2.6rem; }
        .text-size-xl h3 { font-size: 2.1rem; }

        .text-size-xxl { font-size: 1.7rem; }
        .text-size-xxl h1 { font-size: 3.8rem; }
        .text-size-xxl h2 { font-size: 3.1rem; }
        .text-size-xxl h3 { font-size: 2.5rem; }

        .width-narrow { max-width: 680px; }
        .width-medium { max-width: 880px; }
        .width-wide { max-width: 100%; }

        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
            font-weight: 700;
            margin-top: 1.6em;
            margin-bottom: 0.8em;
            line-height: 1.3;
        }
        .markdown-body p { margin-bottom: 1.4em; }
        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1.5em;
            padding-left: 1.75em;
        }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        .markdown-body li { margin-bottom: 0.5em; }
        
        .markdown-body blockquote {
            border-left: 4px solid var(--accent);
            padding: 0.5rem 1.25rem;
            margin: 1.8em 0;
            opacity: 0.95;
            background-color: var(--bg-blockquote);
        }
        
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 2em 0;
            font-size: 0.95em;
        }
        .markdown-body th, .markdown-body td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }
        
        .markdown-body pre {
            padding: 1.1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 1.5em 0;
            font-family: 'Fira Code', monospace;
            font-size: 0.88em;
            background-color: var(--bg-blockquote);
            border: 1px solid var(--border-color);
        }
        .markdown-body code {
            font-family: 'Fira Code', monospace;
            padding: 0.2em 0.4em;
            border-radius: 0.25rem;
            font-size: 0.85em;
        }
        .markdown-body p code, .markdown-body li code {
            background-color: var(--bg-blockquote);
            border: 1px solid var(--border-color);
        }

        /* Task Lists Styling */
        .markdown-body input[type="checkbox"] {
            width: 1.15em;
            height: 1.15em;
            margin: 0 0.4em 0.2em -1.4em;
            vertical-align: middle;
            accent-color: var(--accent);
            cursor: pointer;
        }

        /* ================= DYNAMIC FORMULA BOX DESIGNS ================= */
        .katex-display {
            overflow-x: auto;
            overflow-y: hidden;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* 1. CLASSIC STYLE (Left-border, soft background) */
        .formula-classic .katex-display {
            background-color: var(--bg-blockquote) !important;
            border-left: 4px solid var(--accent) !important;
            border-radius: 0.5rem;
            padding: 0.85rem 1.25rem;
            margin: 1.5em 0;
            border-top: none !important;
            border-right: none !important;
            border-bottom: none !important;
            box-shadow: none !important;
        }

        /* 2. CARD OUTLINE STYLE (Bordered outline, rounded layout, subtle shadow) */
        .formula-card .katex-display {
            background-color: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 0.75rem;
            padding: 1.1rem;
            margin: 1.8em 0;
            box-shadow: 0 2px 8px -1px rgba(0, 0, 0, 0.04), 0 1px 3px -1px rgba(0, 0, 0, 0.02);
        }

        /* 3. THEME CONTRAST BORDER STYLE (Custom requested: Dark in Light theme, Light in Dark theme, matching in Sepia/Slate) */
        .formula-contrast .katex-display {
            background-color: transparent !important;
            border: 1.5px solid var(--text-main) !important;
            border-radius: 0.5rem;
            padding: 1rem 1.25rem;
            margin: 1.5em 0;
            box-shadow: none !important;
        }

        /* 4. MINIMAL CLEAN STYLE (Transparent, pure text look) */
        .formula-minimal .katex-display {
            background-color: transparent !important;
            border: none !important;
            border-radius: 0 !important;
            padding: 0.5rem 0 !important;
            margin: 1.25rem 0 !important;
            box-shadow: none !important;
        }

        /* Double click forced minimal state */
        .katex-display.formula-minimal-forced {
            background-color: transparent !important;
            border: none !important;
            border-radius: 0 !important;
            padding: 0.5rem 0 !important;
            margin: 1.25rem 0 !important;
            box-shadow: none !important;
        }

        /* Double click forced contrast box state */
        .katex-display.formula-contrast-forced {
            background-color: transparent !important;
            border: 1.5px solid var(--text-main) !important;
            border-radius: 0.5rem !important;
            padding: 1rem 1.25rem !important;
            margin: 1.5em 0 !important;
            box-shadow: none !important;
        }

        /* Content Search Highlight Engine classes */
        .content-search-highlight {
            transition: all 0.15s ease-in-out;
        }
        .content-search-highlight.active-highlight {
            background-color: #4f46e5 !important;
            color: #ffffff !important;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.4);
            border-color: #4f46e5 !important;
            transform: scale(1.05);
            display: inline-block;
        }

        #preview-pane {
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* Safe space and padding for editor & preview to avoid overlaps on mobile devices */
        #preview-scroll-container {
            padding-bottom: 12rem !important;
        }
        #markdown-input {
            padding-bottom: 8rem !important;
        }

        /* ================= PREMIUM PRINT LAYOUT SYSTEM ================= */
        @media print {
            /* Unlock HTML flow to print multiple pages properly */
            html, body, #app-container, .flex-1 {
                height: auto !important;
                min-height: 100% !important;
                overflow: visible !important;
                display: block !important;
                background: white !important;
                color: black !important;
            }

            /* Hide everything except the rendering document preview */
            .no-print, 
            #sidebar, 
            #sidebar-overlay, 
            #sidebar-toggle-btn, 
            header, 
            #editor-pane, 
            footer, 
            #exit-focus-btn, 
            #custom-modal, 
            #toast {
                display: none !important;
            }

            /* Maximize the layout area */
            #preview-pane {
                width: 100% !important;
                max-width: 100% !important;
                height: auto !important;
                overflow: visible !important;
                display: block !important;
                position: relative !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            #preview-scroll-container {
                padding: 0 !important;
                margin: 0 !important;
                overflow: visible !important;
                height: auto !important;
                display: block !important;
            }

            #rendered-output {
                max-width: 100% !important;
                width: 100% !important;
                height: auto !important;
                overflow: visible !important;
                display: block !important;
                background: transparent !important;
                color: #000000 !important;
                box-shadow: none !important;
                padding: 0 !important;
            }

            /* Ensure mathematical equations aren't sliced in the middle */
            .katex-display, pre, blockquote, table, tr, img {
                page-break-inside: avoid;
            }

            h1, h2, h3, h4, h5, h6 {
                page-break-after: avoid;
            }

            /* Dedicated Premium PDF Header divider */
            #print-header {
                display: block !important;
                border-bottom: 2.5px solid #0f172a !important;
                padding-bottom: 1rem !important;
                margin-bottom: 2rem !important;
            }
            #print-header h1 {
                color: #0f172a !important;
                font-size: 1.85rem !important;
                font-weight: 800 !important;
            }
        }
    </style>
</head>
<body class="app-bg text-main transition-colors duration-300 h-screen h-[100dvh] flex flex-col overflow-hidden" id="app-container">
    <!-- Main Workspace Container -->
    <div class="flex flex-1 overflow-hidden relative h-full">
        
        <!-- Sidebar Backdrop Overlay -->
        <div id="sidebar-overlay" onclick="toggleSidebar(false)" class="no-print hidden fixed inset-0 bg-black/60 z-30 transition-opacity"></div>
        
        <!-- ================= SIDEBAR (DOCUMENT MANAGER) ================= -->
        <aside id="sidebar" class="no-print fixed lg:static inset-y-0 left-0 w-72 lg:w-64 card-bg border-r border-theme flex flex-col shrink-0 transition-transform duration-300 z-40 -translate-x-full lg:translate-x-0 shadow-2xl lg:shadow-none">
            <!-- Sidebar Header -->
            <div class="p-4 border-b border-theme flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="bg-indigo-600 text-white p-1.5 rounded-lg shadow-sm">
                        <i data-lucide="book-open" class="w-4 h-4"></i>
                    </div>
                    <span class="font-bold text-sm tracking-tight text-main">CleanMark Docs</span>
                </div>
                <!-- Collapse sidebar button -->
                <button onclick="toggleSidebar(false)" class="p-1.5 rounded-lg hover-theme text-muted" title="মেনু বন্ধ করুন">
                    <i data-lucide="chevrons-left" class="w-4 h-4 lg:block hidden"></i>
                    <i data-lucide="x" class="w-4 h-4 lg:hidden block text-red-500 font-bold"></i>
                </button>
            </div>
            
            <!-- New Document & Quick Action Block -->
            <div class="p-3 space-y-2">
                <button onclick="createNewDocument()" class="w-full flex items-center justify-center gap-2 py-2.5 px-3 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold rounded-lg shadow-md transition">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span>নতুন ডকুমেন্ট</span>
                </button>
                <div class="flex gap-1">
                    <button onclick="triggerImport()" class="flex-1 flex items-center justify-center gap-1.5 py-1.5 px-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-muted rounded-lg text-[11px] font-medium transition" title="মার্কডাউন ফাইল আপলোড">
                        <i data-lucide="upload" class="w-3.5 h-3.5"></i> ইম্পোর্ট
                    </button>
                    <button onclick="exportMarkdownFile()" class="flex-1 flex items-center justify-center gap-1.5 py-1.5 px-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-muted rounded-lg text-[11px] font-medium transition" title="ডাউনলোড মার্কডাউন">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i> এক্সপোর্ট
                    </button>
                </div>
                <input type="file" id="file-import-input" accept=".md,.txt" class="hidden" onchange="handleFileImport(event)">
            </div>
            
            <!-- Live Document Search Bar -->
            <div class="px-3 pb-2">
                <div class="relative flex items-center">
                    <i data-lucide="search" class="w-3.5 h-3.5 absolute left-3 text-muted pointer-events-none"></i>
                    <input type="text" id="search-input" oninput="searchDocuments(this.value)" placeholder="ডকুমেন্ট খুঁজুন..." class="w-full text-xs pl-8 pr-3 py-1.5 rounded-lg border border-theme input-bg focus:ring-1 focus:ring-indigo-500 focus:outline-none">
                </div>
            </div>
            
            <!-- Document List Section -->
            <div class="flex-1 overflow-y-auto px-2 pb-4">
                <p class="text-[10px] uppercase font-bold text-muted tracking-wider px-3 mb-2">ডকুমেন্ট তালিকা</p>
                <div id="document-list" class="space-y-1">
                    <!-- Injected via JavaScript -->
                </div>
            </div>
            
            <!-- Sidebar Footer -->
            <div class="p-3 border-t border-theme text-xs">
                <button onclick="confirmResetAll()" class="w-full text-left flex items-center gap-2 py-2 px-3 text-red-500 hover:bg-red-50 dark:hover:bg-red-950/20 rounded-lg transition">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                    <span>সকল ডাটা মুছুন</span>
                </button>
            </div>
        </aside>
        
        <!-- Sidebar Floating Toggle Button for collapsed layout -->
        <button id="sidebar-toggle-btn" onclick="toggleSidebar(true)" class="no-print fixed left-4 bottom-4 bg-indigo-600 text-white p-3.5 rounded-full shadow-2xl z-30 hover:bg-indigo-700 transition lg:hidden" title="মেনু খুলুন">
            <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        
        <!-- ================= MAIN WORKSPACE AREA ================= -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative h-full">
            <!-- Top Control Bar / Toolbar -->
            <header class="no-print border-b border-theme px-4 py-2 transition-colors duration-300 card-bg flex flex-wrap items-center justify-between gap-3 shrink-0">
                
                <!-- 1. LEFT PANEL: Standard branding & Doc title (Hidden in Focus Mode) -->
                <div id="header-left-standard" class="flex items-center gap-3">
                    <button id="header-menu-btn" onclick="toggleSidebar(true)" class="p-1.5 rounded-lg hover-theme text-muted">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <div>
                        <!-- Editable Document Title -->
                        <div class="flex items-center gap-2">
                            <input type="text" id="active-document-title" oninput="renameActiveDocument(this.value)" class="text-sm font-bold bg-transparent border-b border-transparent hover:border-theme focus:border-indigo-500 focus:outline-none py-0.5 text-main max-w-[120px] sm:max-w-xs transition" value="Untitled Document">
                            <span class="text-[10px] bg-amber-100 text-amber-700 dark:bg-amber-950/40 dark:text-amber-400 px-1.5 py-0.5 rounded font-semibold hidden" id="unsaved-badge">অসংরক্ষিত</span>
                            <span class="text-[10px] bg-emerald-100 text-emerald-700 dark:bg-emerald-950/40 dark:text-emerald-400 px-1.5 py-0.5 rounded" id="saved-badge">ডিভাইসে সংরক্ষিত</span>
                        </div>
                    </div>
                </div>

                <!-- 2. CENTER PANEL: Document Content Word-by-Word Search Engine -->
                <div id="header-search-container" class="flex-1 max-w-xs sm:max-w-sm md:max-w-md">
                    <div id="content-search-bar" class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-lg px-2.5 py-1.5 gap-2 border border-theme w-full shadow-inner">
                        <i data-lucide="search" class="w-3.5 h-3.5 text-muted shrink-0"></i>
                        <input type="text" id="content-search-input" oninput="highlightContentSearch()" placeholder="লেখার ভেতর খুঁজুন..." class="bg-transparent focus:outline-none text-xs text-main w-full placeholder-slate-400 dark:placeholder-slate-500">

## 🚀 চমৎকার সব ফিচারের ব্যবহার:

### ১. গাণিতিক সমীকরণ ও বিজ্ঞান সূত্র (LaTeX Math Support)
এখন আপনার এই এডিটরে সব ধরণের গাণিতিক ও বৈজ্ঞানি সমীকরণ সরাসরি রেন্ডার হবে! সূত্রগুলোর সাজসজ্জা পরিবর্তন করতে উপরের **"সূত্র স্টাইল"** ড্রপডাউনটি ব্যবহার করুন।

**ইনলাইন গাণিতিক সমীকরণ (Inline Equation):**
বিজ্ঞানের সবচাইতে বিখ্যাত সমীকরণটি হলো $E = mc^2$ এবং বৃত্তের ক্ষেত্রফল $A = \\pi r^2$।

**জটিল ब्लॉक লেভেল সমীকরণ (Display / Block Equation):**
নিচে ক্যালকুলাস এবং কোয়ান্টাম বলবিদ্যার কিছু অসাধারণ সমীকরণ উপস্থাপন করা হলো:

$$f(x) = \\int_{-\\infty}^{\\infty} e^{-x^2} dx = \\sqrt{\\pi}$$

        // Translate standard numbers and format Bengali Dates & Times cleanly
        function getBengaliTime(isoString) {
            if (!isoString) return "";
            const date = new Date(isoString);
            if (isNaN(date.getTime())) return "";

            const convertToBn = (str) => {
                const numbers = {'0': '০', '1': '১', '2': '২', '3': '৩', '4': '৪', '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯'};
                return str.toString().replace(/[0-9]/g, w => numbers[w]);
            };

            const now = new Date();
            const isToday = date.toDateString() === now.toDateString();
            
            let hours = date.getHours();
            const minutes = date.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            const formattedTime = `${convertToBn(hours.toString().padStart(2, '0'))}:${convertToBn(minutes)} ${ampm}`;

            const timeDiff = now - date;
            const oneDay = 24 * 60 * 60 * 1000;

            if (isToday) {
                return `আজ, ${formattedTime}`;
            } else if (timeDiff < 2 * oneDay && now.getDate() - date.getDate() === 1) {
                return `গতকাল, ${formattedTime}`;
            } else {
                const months = ['জানুয়ারি', 'ফেব্রুয়ারি', 'মার্চ', 'এপ্রিল', 'মে', 'জুন', 'জুলাই', 'আগস্ট', 'সেপ্টেম্বর', 'অক্টোবর', 'নভেম্বর', 'ডিসেম্বর'];
                const day = convertToBn(date.getDate());
                const month = months[date.getMonth()];
                const year = convertToBn(date.getFullYear());
                return `${day} ${month} ${year}, ${formattedTime}`;
            }
        }

        // Comprehensive Bengali Time string for PDF Print Header
        function getDetailedBengaliDateTime(dateObj) {
            const numbers = {'0': '০', '1': '১', '2': '২', '3': '৩', '4': '৪', '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯'};
            const convertToBn = (str) => str.toString().replace(/[0-9]/g, w => numbers[w]);

            const hours = dateObj.getHours();
            const minutes = dateObj.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;
            
            const formattedTime = `${convertToBn(displayHours.toString().padStart(2, '0'))}:${convertToBn(minutes)} ${ampm}`;
            const day = convertToBn(dateObj.getDate());
            const months = ['জানুয়ারি', 'ফেব্রুয়ারি', 'মার্চ', 'এপ্রিল', 'মে', 'জুন', 'জুলাই', 'আগস্ট', 'সেপ্টেম্বর', 'অক্টোবর', 'নভেম্বর', 'ডিসেম্বর'];
            const month = months[dateObj.getMonth()];
            const year = convertToBn(dateObj.getFullYear());

            return `${day} ${month}, ${year} | সময়: ${formattedTime}`;
        }

        function loadStateFromStorage() {
            // Load saved settings
            state.theme = localStorage.getItem('cm_theme') || 'light';
            state.textSize = localStorage.getItem('cm_text_size') || 'md';
            state.fontFamily = localStorage.getItem('cm_font') || 'notosans';
            state.layoutWidth = localStorage.getItem('cm_width') || 'medium';
            state.syncScroll = (localStorage.getItem('cm_sync_scroll') !== 'false');
            state.formulaStyle = localStorage.getItem('cm_formula_style') || 'classic';
            state.doubleClickMinimal = (localStorage.getItem('cm_double_click_minimal') !== 'false');

            // Load Saved Docs
            const savedDocs = localStorage.getItem('cm_documents');
            if (savedDocs) {
                try {
                    state.docs = JSON.parse(savedDocs);
                } catch (e) {
                    state.docs = [];
                }
            }
            
            // Create initial doc if list is empty
            if (state.docs.length === 0) {
                const initDoc = {
                    id: 'doc_' + Date.now(),
                    title: 'স্বাগতম টিউটোরিয়াল',
                    content: defaultSampleMarkdown,
                    updatedAt: new Date().toISOString()
                };
                state.docs.push(initDoc);
                localStorage.setItem('cm_documents', JSON.stringify(state.docs));
            }

            // Set current active document
            const savedActiveId = localStorage.getItem('cm_active_doc_id');
            const docExists = state.docs.some(d => d.id === savedActiveId);
            if (savedActiveId && docExists) {
                state.activeDocId = savedActiveId;
            } else {
                state.activeDocId = state.docs[0].id;
            }

            // Apply all states dynamically
            setTheme(state.theme);
            setTextSize(state.textSize);
            setFontFamily(state.fontFamily);
            setPageWidth(state.layoutWidth);

            document.getElementById('width-select').value = state.layoutWidth;
            document.getElementById('formula-select').value = state.formulaStyle;

                        const firstLine = currentVal.trim().split('\n')[0];

        // Advanced bi-directional Scroll Linkage (Sync Scroll)
        function setupSyncScrolling() {
            const editor = document.getElementById('markdown-input');
            const preview = document.getElementById('preview-pane');
            let isScrollingEditor = false;
            let isScrollingPreview = false;

            editor.addEventListener('scroll', function() {
                if (!state.syncScroll || isScrollingPreview) return;
                isScrollingEditor = true;
                const maxEditorScroll = editor.scrollHeight - editor.clientHeight;
                const scrollPercentage = maxEditorScroll > 0 ? (editor.scrollTop / maxEditorScroll) : 0;
                preview.scrollTop = scrollPercentage * (preview.scrollHeight - preview.clientHeight);
                setTimeout(() => { isScrollingEditor = false; }, 100);
            });

            preview.addEventListener('scroll', function() {
                if (!state.syncScroll || isScrollingEditor) return;
                isScrollingEditor = true;
                const maxPreviewScroll = preview.scrollHeight - preview.clientHeight;
                const scrollPercentage = maxPreviewScroll > 0 ? (preview.scrollTop / maxPreviewScroll) : 0;
                editor.scrollTop = scrollPercentage * (editor.scrollHeight - editor.clientHeight);
                setTimeout(() => { isScrollingEditor = false; }, 100);
            });
        }

        function renderMarkdown() {
            const markdownText = document.getElementById('markdown-input').value;
            const outputContainer = document.getElementById('rendered-output');
            
            // Render markdown using Marked
            let rawHtml = '';
            if (typeof marked !== 'undefined') {
                rawHtml = marked.parse(markdownText);
            } else {
                rawHtml = markdownText.replace(/\n/g, '<br>');
                console.warn("Marked library is not loaded yet.");
            }

            // Secure and permissive HTML sanitizing allowing styling classes & HTML structures perfectly
            const cleanHtml = (typeof DOMPurify !== 'undefined') 
                ? DOMPurify.sanitize(rawHtml, { 
                    ADD_ATTR: ['style', 'class', 'target'], 
                    ADD_TAGS: ['style', 'iframe', 'span', 'div'],
                    FORCE_BODY: true 
                  }) 
                : rawHtml;
                
            outputContainer.innerHTML = cleanHtml;
            
            // 1. Trigger syntax highlighting on elements
            if (typeof hljs !== 'undefined') {
                outputContainer.querySelectorAll('pre code').forEach((block) => {
                    try {
                        hljs.highlightElement(block);
                    } catch (e) {
                        console.error("Highlight.js processing error: ", e);
                    }
                });
            } else {
                console.warn("Highlight.js is not defined yet.");
            }

            // 2. Trigger auto-render KaTeX Math
            if (typeof renderMathInElement !== 'undefined') {
                try {
                    renderMathInElement(outputContainer, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false
                    });
                } catch (err) {
                    console.warn("KaTeX compilation warning: ", err);
                }
            } else {
                console.warn("KaTeX auto-render library is not defined yet.");
            }

            // 3. Connect double-click / triple-click style cycle listener to generated display formulas
            outputContainer.querySelectorAll('.katex-display').forEach((el) => {
                if (state.doubleClickMinimal) {
                    el.style.cursor = 'pointer';
                    el.setAttribute('title', 'ডাবল-ক্লিক করে সমীকরণ বক্স পরিবর্তন করুন (সাইকেল মোড)');
                } else {
                    el.style.cursor = 'default';
                    el.removeAttribute('title');
                }
                
                el.addEventListener('dblclick', () => {
                    if (state.doubleClickMinimal) {
                        if (state.formulaStyle === 'minimal') {
                            // If currently Minimal, double clicking toggles forced Contrast Box (B/W Box)
                            if (el.classList.contains('formula-contrast-forced')) {
                                el.classList.remove('formula-contrast-forced');
                            } else {
                                el.classList.add('formula-contrast-forced');
                            }
                        } else {
                            // If Classic, Card, or Contrast, double click toggles: Setting Original -> forced minimal -> forced Contrast Box -> Setting Original
                            if (el.classList.contains('formula-minimal-forced')) {
                                el.classList.remove('formula-minimal-forced');
                                el.classList.add('formula-contrast-forced');
                            } else if (el.classList.contains('formula-contrast-forced')) {
                                el.classList.remove('formula-contrast-forced');
                            } else {
                                el.classList.add('formula-minimal-forced');
                            }
                        }
                    }
                });
            });

            // Keep HTML checkboxes interactive
            setupCheckboxListeners();
            
            // Automatically run text highlights if a search term is already active
            const query = document.getElementById('content-search-input').value.trim();
            if (query !== '') {
                highlightContentSearch();
            }
        }

        // ================= DOCUMENT INTERIOR CONTENT SEARCH ENGINE =================
        function highlightContentSearch() {
            const query = document.getElementById('content-search-input').value.trim();
            const container = document.getElementById('rendered-output');
            
            // Clean previous highlighting
            clearContentHighlights(container);
            searchMatches = [];
            currentMatchIndex = -1;
            updateMatchCounter();

            if (!query) return;

            // Deep text traversal avoiding code blocks, KaTeX math rendering tags, scripts, etc.
            function traverseAndHighlight(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    const text = node.nodeValue;
                    const regex = new RegExp(escapeRegExp(query), 'gi');
                    let match;
                    
                    // Filter: Skip math, scripts, style, KaTeX containers, etc.
                    let parent = node.parentNode;
                    while (parent && parent !== container) {
                        if (parent.parent && (parent.tagName === 'SCRIPT' || 
                            parent.tagName === 'STYLE' || 
                            parent.classList.contains('katex') || 
                            parent.classList.contains('katex-display') ||
                            parent.tagName === 'TEXTAREA' ||
                            parent.tagName === 'INPUT')) {
                            return; 
                        }
                        parent = parent.parentNode;
                    }

                    const matches = [];
                    while ((match = regex.exec(text)) !== null) {
                        matches.push(match);
                    }

                    if (matches.length > 0) {
                        const parentNode = node.parentNode;
                        const fragments = document.createDocumentFragment();
                        let lastIdx = 0;

                        matches.forEach((m) => {
                            if (m.index > lastIdx) {
                                fragments.appendChild(document.createTextNode(text.substring(lastIdx, m.index)));
                            }
                            
                            // Wrapping matched term into highlighted <mark> tags
                            const mark = document.createElement('mark');
                            mark.className = 'content-search-highlight bg-amber-200 dark:bg-amber-600/50 text-slate-950 dark:text-slate-100 px-0.5 rounded transition-all duration-200 border border-transparent cursor-pointer';
                            mark.innerText = m[0];
                            fragments.appendChild(mark);
                            searchMatches.push(mark);
                            
                            lastIdx = m.index + m[0].length;
                        });

                        if (lastIdx < text.length) {
                            fragments.appendChild(document.createTextNode(text.substring(lastIdx)));
                        }

                        parentNode.replaceChild(fragments, node);
                    }
                } else if (node.nodeType === Node.ELEMENT_NODE && node.childNodes) {
                    // Copy list because replacing nodes modifies child structure dynamically
                    const children = Array.from(node.childNodes);
                    children.forEach(traverseAndHighlight);
                }
            }

            traverseAndHighlight(container);
            
            if (searchMatches.length > 0) {
                currentMatchIndex = 0;
                highlightActiveMatch();
            }
            updateMatchCounter();
        }

        // Clean up previously created <mark> highlights non-destructively
        function clearContentHighlights(container) {
            const highlights = container.querySelectorAll('.content-search-highlight');
            highlights.forEach(h => {
                const parent = h.parentNode;
                if (parent) {
                    parent.replaceChild(document.createTextNode(h.innerText), h);
                }
            });
            container.normalize(); // Combines adjacent siblings text nodes
        }

        function highlightActiveMatch() {
            // Restore standard inactive highlights
            searchMatches.forEach(m => {
                m.className = 'content-search-highlight bg-amber-200 dark:bg-amber-600/50 text-slate-950 dark:text-slate-100 px-0.5 rounded transition-all duration-200 border border-transparent';
            });

            if (currentMatchIndex >= 0 && currentMatchIndex < searchMatches.length) {
                const activeMark = searchMatches[currentMatchIndex];
                
                // Active highlight: custom active-highlight styling class
                activeMark.className = 'content-search-highlight active-highlight px-1.5 rounded text-white font-bold transition-all duration-300';
                
                // Scroll beautifully into focus pane viewport
                activeMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // Move active search cursor forwards
        function nextContentMatch() {
            if (searchMatches.length === 0) return;
            currentMatchIndex = (currentMatchIndex + 1) % searchMatches.length;
            highlightActiveMatch();
            updateMatchCounter();
        }

        // Move active search cursor backwards
        function prevContentMatch() {
            if (searchMatches.length === 0) return;
            currentMatchIndex = (currentMatchIndex - 1 + searchMatches.length) % searchMatches.length;
            highlightActiveMatch();
            updateMatchCounter();
        }

        // Sync match counter indicator (e.g. 1/5)
        function updateMatchCounter() {
            const counterEl = document.getElementById('content-search-counter');
            if (searchMatches.length > 0) {
                counterEl.innerText = `${currentMatchIndex + 1}/${searchMatches.length}`;
                counterEl.classList.remove('hidden');

                counterEl.classList.add('hidden');
            }
        }

        // Helper regex escaper
        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

        function setupCheckboxListeners() {
            const outputContainer = document.getElementById('rendered-output');
            const checkboxes = outputContainer.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach((cb, index) => {
                cb.removeAttribute('disabled'); // Allow interactive clicking
                cb.addEventListener('change', () => {
                    updateCheckboxInSource(index, cb.checked);
                });
            });
        }

        function updateCheckboxInSource(targetIndex, isChecked) {
            const textarea = document.getElementById('markdown-input');
            let currentContent = textarea.value;
            
            // Regex to match markdown checkbox list items
            const checkboxRegex = /^\s*([-*] \[[ xX]\])/gm;
            let match;
            let matchCount = 0;
            
            while ((match = checkboxRegex.exec(currentContent)) !== null) {
                if (matchCount === targetIndex) {
                    const matchedStr = match[1];
                    const startPos = match.index;
                    const endPos = startPos + matchedStr.length;
                    
                    const replacement = matchedStr.includes('-') 
                        ? `- [${isChecked ? 'x' : ' '}]`
                        : `* [${isChecked ? 'x' : ' '}]`;
                        
                    textarea.value = currentContent.substring(0, startPos) + replacement + currentContent.substring(endPos);
                    onContentChange();
                    break;
                }
                matchCount++;
            }
        }

            const sidebarBtn = document.getElementById('sidebar-toggle-btn');
            const searchContainer = document.getElementById('header-search-container');
            
            if (state.isFocusMode) {
                toggleSidebar(false); 
                sidebarBtn.classList.add('hidden');
                
                editorPane.classList.add('hidden');
                if (mobileTabs) mobileTabs.classList.add('hidden');
                
                previewPane.classList.remove('lg:w-1/2');
                previewPane.classList.add('w-full');
                
                // Hide standard toolbar controls dynamically
                leftStandard.classList.add('hidden');
                rightStandard.classList.add('hidden');
                
                // Show exit focus option in header directly
                focusExit.classList.remove('hidden');
                
                // Maximize search bar visual space in Focus Mode
                searchContainer.className = "flex-1 max-w-sm sm:max-w-md mx-auto";
                
                setPageWidth('narrow');
                document.getElementById('width-select').value = 'narrow';
                
                showToast("রিডিং মোড চালু হয়েছে। মনোরম পড়ার অভিজ্ঞতা নিন!");
            } else {
                if (window.innerWidth >= 1024) {
                    toggleSidebar(true);
                } else {
                    sidebarBtn.classList.remove('hidden');
                    if (mobileTabs) mobileTabs.classList.remove('hidden');
                }
                previewPane.classList.remove('w-full');
                previewPane.classList.add('lg:w-1/2');
                
                // Restore standard toolbar controls
                leftStandard.classList.remove('hidden');
                rightStandard.classList.remove('hidden');
                focusExit.classList.add('hidden');
                
                searchContainer.className = "flex-1 max-w-xs sm:max-w-sm md:max-w-md";
                
                setPageWidth(state.layoutWidth);
                document.getElementById('width-select').value = state.layoutWidth;
            }
        }

        function insertMarkdown(type) {
            const textarea = document.getElementById('markdown-input');
            const startPos = textarea.selectionStart;
            const endPos = textarea.selectionEnd;
            const selectedText = textarea.value.substring(startPos, endPos);
            let replacement = "";
            switch (type) {
                case 'bold':
                    replacement = `**${selectedText || 'বোল্ড লেখা'}**`;
                    break;
                case 'italic':
                    replacement = `*${selectedText || 'ইটালিক লেখা'}*`;
                    break;
                case 'header':
                    replacement = `\n## ${selectedText || 'নতুন হেডার'}\n`;
                    break;
                case 'link':
                    replacement = `[${selectedText || 'লিংক টাইটেল'}](https://example.com)`;
                    break;
                case 'quote':
                    replacement = `\n> ${selectedText || 'একটি কোট বা উদ্ধৃতি এটি।'}\n`;
                    break;
                case 'code':
                    replacement = `\n\`\`\`javascript\n${selectedText || '// কোড এখানে লিখুন'}\n\`\`\`\n`;
                    break;
                case 'list-ul':
                    replacement = `\n* ${selectedText || 'লিস্ট আইটেম ১'}\n* লিস্ট আইটেম ২`;
                    break;
                case 'list-tasks':
                    replacement = `\n- [ ] ${selectedText || 'নতুন টাস্ক বা কাজ'}\n- [ ] আরেকটি টাস্ক`;
                    break;
                case 'latex-block':
                    replacement = `\n$$\n${selectedText || 'f(x) = \\int_{-\\infty}^{\\infty} e^{-x^2} dx = \\sqrt{\\pi}'}\n$$\n`;
                    break;
                case 'table':
                    replacement = `\n| কলাম ১ | কলাম ২ |\n| :--- | :--- |\n| ডাটা ১ | ডাটা ২ |\n`;
                    break;
            }
            textarea.focus();
            textarea.value = textarea.value.substring(0, startPos) + replacement + textarea.value.substring(endPos, textarea.value.length);
            
            onContentChange();
            textarea.setSelectionRange(startPos + replacement.length, startPos + replacement.length);
        }

        // Smart Clear Editor with Unsaved changes tracking
        function clearEditor() {
            const textarea = document.getElementById('markdown-input');
            if (textarea.value.trim() === '') {
                showToast("এডিটর ইতিমধ্যেই খালি আছে!");
                return;
            }
            if (state.isUnsaved) {
                openCustomModal(
                    "এডিটর খালি করার সতর্কতা!",
                    "আপনার এডিটরে কিছু অসংরক্ষিত তথ্য রয়েছে। আপনি কি প্রথমে পরিবর্তনগুলো সেভ করতে চান নাকি সরাসরি ক্লিয়ার করতে চান?",
                    [
                        {
                            text: "সেভ ও ক্লিয়ার করুন",
                            class: "px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg",
                            onClick: () => {
                                manualSaveCurrentDoc();
                                textarea.value = '';
                                onContentChange();
                                setUnsavedState(false);
                                saveDocsToStorage();
                                showToast("সংরক্ষণ করা হয়েছে এবং এডিটর খালি করা হয়েছে!");
                            }
                        },
                        {
                            text: "সরাসরি ক্লিয়ার করুন",
                            class: "px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg",
                            onClick: () => {
                                textarea.value = '';
                                onContentChange();
                                showToast("এডিটর খালি করা হয়েছে (সংরক্ষণ করা হয়নি)");
                            }
                        },
                        {
                            text: "বাতিল",
                            class: "px-4 py-2 text-muted bg-slate-100 dark:bg-slate-800 rounded-lg",
                            onClick: () => {}
                        }
                    ]
                );
            } else {
                textarea.value = '';
                onContentChange();
                showToast("এডিটর খালি করা হয়েছে");
            }
        }

        // Copy rendered output as HTML
        function copyOutputHTML() {
            const outputHTML = document.getElementById('rendered-output').innerHTML;
            
            const el = document.createElement('textarea');
            el.value = outputHTML;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            showToast("HTML কোড ক্লিপবোর্ডে কপি করা হয়েছে!");
        }

        // Responsive Mobile Tab management
        function switchMobileTab(tab) {
            state.activeMobileTab = tab;
            const editorPane = document.getElementById('editor-pane');
            const previewPane = document.getElementById('preview-pane');
            const tabEdit = document.getElementById('tab-edit');
            const tabPreview = document.getElementById('tab-preview');
            if (tab === 'edit') {
                editorPane.classList.remove('hidden');
                previewPane.classList.add('hidden');
                
                tabEdit.className = "flex-1 flex items-center justify-center gap-1 px-4 py-1.5 rounded-md text-xs font-semibold bg-indigo-600 text-white shadow-md";
                tabPreview.className = "flex-1 flex items-center justify-center gap-1 px-4 py-1.5 rounded-md text-xs font-semibold text-muted hover-theme";
            } else {
                editorPane.classList.add('hidden');
                previewPane.classList.remove('hidden');
                
                tabPreview.className = "flex-1 flex items-center justify-center gap-1 px-4 py-1.5 rounded-md text-xs font-semibold bg-indigo-600 text-white shadow-md";
                tabEdit.className = "flex-1 flex items-center justify-center gap-1 px-4 py-1.5 rounded-md text-xs font-semibold text-muted hover-theme";
            }
        }

        // Check layout widths to control responsive elements on resizing
        function checkScreenLayout() {
            const isMobile = window.innerWidth < 1024;
            const sidebar = document.getElementById('sidebar');
            const editorPane = document.getElementById('editor-pane');
            const previewPane = document.getElementById('preview-pane');
            const headerMenuBtn = document.getElementById('header-menu-btn');
            const desktopSidebarBtn = document.getElementById('sidebar-toggle-btn');
            const mobileTabs = document.getElementById('mobile-tabs');
            
            if (!isMobile) {
                headerMenuBtn.classList.add('hidden');
                if (state.isSidebarOpen) {
                    sidebar.classList.remove('-translate-x-full');
                    desktopSidebarBtn.classList.add('hidden');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    desktopSidebarBtn.classList.remove('hidden');
                }
                
                if (!state.isFocusMode) {
                    editorPane.classList.remove('hidden');
                }
                previewPane.classList.remove('hidden', 'w-full');
                previewPane.classList.add('lg:w-1/2');
                if (mobileTabs) mobileTabs.classList.add('hidden');
            } else {
                sidebar.classList.add('-translate-x-full'); 
                headerMenuBtn.classList.remove('hidden');
                desktopSidebarBtn.classList.remove('hidden');
                state.isSidebarOpen = false;
                if (mobileTabs && !state.isFocusMode) {
                    mobileTabs.classList.remove('hidden');
                    switchMobileTab(state.activeMobileTab);
                }
            }
        }

        // HTML escaping utility helper
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Elegant Toast notification displays
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
